<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Industry Insights | Feuern Outsourcing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;background:#f5f7fb;margin:0;}
.container{max-width:1000px;margin:auto;padding:60px 20px;}
h1{color:#0e2a47;}
.blog-card{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
a{text-decoration:none;color:#ff7a00;font-weight:600;}
.back{display:inline-block;margin-bottom:30px;color:#0e2a47;}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back to Home</a>

<h1>Industry Insights</h1>

<div id="blog-list"></div>

</div>

<script>
fetch('blogs.json')
.then(response => response.json())
.then(data => {
    const container = document.getElementById('blog-list');
    data.forEach(blog => {
        container.innerHTML += `
            <div class="blog-card">
                <h2><a href="${blog.file}">${blog.title}</a></h2>
                <p>${blog.excerpt}</p>
                <p style="font-size:14px;opacity:0.6;">${blog.date}</p>
            </div>
        `;
    });
});
</script>

</body>
</html>
